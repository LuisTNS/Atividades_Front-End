<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Questão 04 – Perfil do Jogador</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>
    body {
      background-image: url(FIFA-World-Cup-26.jpg);
      background-size: cover;
      background-position: center;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container-cards {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      width: 360px;
      border-radius: 16px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.15);
      overflow: hidden;
    }

    .card-header {
      background-color: #1a5c2a;
      color: #ffffff;
      text-align: center;
      font-size: 1.2rem;
      font-weight: bold;
      padding: 16px;
    }

    #foto-jogador {
      width: 100%;
      height: 260px;
      object-fit: cover;
      background-color: #cccccc;
    }

    .placeholder-text {
      background-color: #dee2e6;
      color: #dee2e6;
      border-radius: 4px;
      user-select: none;
    }

    .card-text {
      color: #222222;
    }

    .info-label {
      font-weight: bold;
      color: #1a5c2a;
      min-width: 130px;
      display: inline-block;
    }

    .btn-revelar,
    .btn-add {
      background-color: #1a5c2a;
      color: #ffffff;
      border: none;
      width: 100%;
      padding: 12px;
      font-weight: bold;
    }

    .btn-add {
      border-radius: 0 0 16px 16px;
    }

    .btn-revelar:hover,
    .btn-add:hover {
      background-color: #145222;
    }
  </style>
</head>

<body>

  <div class="container-cards">

    <div class="card">
      <div class="card-header">⚽ Perfil do Jogador</div>

      <img id="foto-jogador" src="img_.svg" alt="Foto do jogador" />

      <div class="card-body">
        <ul class="list-unstyled mb-3">

          <li class="mb-2">
            <span class="info-label">Nome:</span>
            <span id="nome" class="placeholder-text">????????????????????</span>
          </li>

          <li class="mb-2">
            <span class="info-label">Nascimento:</span>
            <span id="nascimento" class="placeholder-text">??/??/????</span>
          </li>

          <li class="mb-2">
            <span class="info-label">Altura:</span>
            <span id="altura" class="placeholder-text">?.?? m</span>
          </li>

          <li class="mb-2">
            <span class="info-label">Posição:</span>
            <span id="posicao" class="placeholder-text">???????????</span>
          </li>

          <li class="mb-2">
            <span class="info-label">Rank:</span>
            <span id="rank" class="placeholder-text">??</span>
          </li>

        </ul>

        <button class="btn-revelar mb-2" onclick="revelar()">
          Revelar
        </button>

        <button class="btn-add" onclick="add()">
          Adicionar Novo Jogador
        </button>
      </div>
    </div>

  </div>

  <script>
    function revelar() {

      document.getElementById("foto-jogador").src = "_vinicius_junior.png";

      document.getElementById("nome").textContent =
        "Vinícius José Paixão de Oliveira Júnior";

      document.getElementById("nascimento").textContent =
        "12/07/2000 (25 anos)";

      document.getElementById("altura").textContent =
        "1,76 m";

      document.getElementById("posicao").textContent =
        "Ponta-esquerda / Atacante";

      document.getElementById("rank").textContent =
        "9,5";

      const elementos = document.querySelectorAll(".placeholder-text");

      elementos.forEach(el => {
        el.classList.remove("placeholder-text");
        el.classList.add("card-text");
      });
    }

    function add() {

      const container = document.querySelector(".container-cards");

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <div class="card-header">⚽ Perfil do Jogador</div>

        <img src="Lucas_Paqueta.png" class="card-img-top">

        <div class="card-body">
          <ul class="list-unstyled mb-3">

            <li class="mb-2">
              <span class="info-label">Nome:</span>
              <span class="card-text">Lucas Tolentino Coelho de Lima</span>
            </li>

            <li class="mb-2">
              <span class="info-label">Nascimento:</span>
              <span class="card-text">27/08/1997 (28 anos)</span>
            </li>

            <li class="mb-2">
              <span class="info-label">Altura:</span>
              <span class="card-text">1,80 m</span>
            </li>

            <li class="mb-2">
              <span class="info-label">Posição:</span>
              <span class="card-text">Meio-campista</span>
            </li>

            <li class="mb-2">
              <span class="info-label">Rank:</span>
              <span class="card-text">8,8</span>
            </li>

          </ul>
        </div>
      `;

      container.appendChild(card);
    }
  </script>

</body>
</html>
