<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Validador de CPF</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
    }

    .cabecalho {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .cabecalho small {
      font-size: 12px;
      color: #888;
    }

    .cabecalho h1 {
      font-size: 22px;
      font-weight: 600;
      color: #1a1a1a;
      margin-top: 4px;
    }

    label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 6px;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px 14px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      letter-spacing: 0.05em;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #4a90e2;
    }

    button {
      width: 100%;
      margin-top: 12px;
      padding: 11px;
      font-size: 15px;
      font-weight: 600;
      background-color: #4a90e2;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #357abd;
    }

    button:active {
      background-color: #2a6099;
    }

    #resultado {
      display: none;
      margin-top: 1rem;
      border-radius: 8px;
      padding: 14px 16px;
      text-align: center;
    }

    #resultado.valido {
      background-color: #e6f4ea;
      border: 1px solid #4caf50;
      color: #2e7d32;
    }

    #resultado.invalido {
      background-color: #fdecea;
      border: 1px solid #e53935;
      color: #c62828;
    }

    #resultado p {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    #resultado small {
      font-size: 13px;
      opacity: 0.85;
    }

    .info {
      margin-top: 1.5rem;
      background: #f8f9fa;
      border-radius: 8px;
      padding: 1rem 1.25rem;
    }

    .info strong {
      font-size: 13px;
      color: #333;
      display: block;
      margin-bottom: 6px;
    }

    .info p {
      font-size: 12px;
      color: #666;
      line-height: 1.7;
    }
  </style>
</head>
<body>

  <div class="card">

    <div class="cabecalho">
      <small>Laboratório FrontEnd · Exercício 01</small>
      <h1>Validador de CPF</h1>
    </div>

    <label for="cpf-input">Número do CPF</label>
    <input
      type="text"
      id="cpf-input"
      placeholder="000.000.000-00"
      maxlength="14"
    />

    <button onclick="validar()">Validar CPF</button>

    <div id="resultado">
      <p id="resultado-texto"></p>
      <small id="resultado-detalhe"></small>
    </div>
