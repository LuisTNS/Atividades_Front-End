<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conversor de Temperatura</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
    }

    .cabecalho {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .cabecalho small {
      font-size: 12px;
      color: #888;
    }

    .cabecalho h1 {
      font-size: 22px;
      font-weight: 600;
      color: #1a1a1a;
      margin-top: 4px;
    }

    .campo {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 6px;
    }

    input[type="number"] {
      width: 100%;
      padding: 10px 14px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="number"]:focus {
      border-color: #4a90e2;
    }

    .divisor {
      text-align: center;
      font-size: 20px;
      color: #aaa;
      margin: 0.5rem 0;
    }
  </style>
</head>
<body>

  <div class="card">

    <div class="cabecalho">
      <small>Laboratório FrontEnd · Exercício 02</small>
      <h1>Conversor de Temperatura</h1>
    </div>

    <div class="campo">
      <label for="celsius">Celsius (°C)</label>
      <input type="number" id="celsius" placeholder="Digite em °C" step="0.1" />
    </div>

    <div class="divisor">⇅</div>
